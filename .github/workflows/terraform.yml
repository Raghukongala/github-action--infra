name: Terraform Infra Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to perform'
        required: true
        default: 'apply'
        type: choice
        options:
        - plan
        - apply
        - destroy

env:
  AWS_REGION: ap-south-1
  TF_VERSION: 1.5.0
  CLUSTER_NAME: ecommerce-eks

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || 'apply' }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Install kubectl
      run: |
        curl -LO "https://dl.k8s.io/release/v1.29.0/bin/linux/amd64/kubectl"
        chmod +x kubectl && sudo mv kubectl /usr/local/bin/

    - name: Install Helm
      run: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}
        terraform_wrapper: false

    - name: Bootstrap DynamoDB Lock Table
      run: |
        aws dynamodb describe-table --table-name raghuterraform-lock --region $AWS_REGION 2>/dev/null || \
        aws dynamodb create-table \
          --table-name raghuterraform-lock \
          --attribute-definitions AttributeName=LockID,AttributeType=S \
          --key-schema AttributeName=LockID,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          --region $AWS_REGION
        aws dynamodb wait table-exists --table-name raghuterraform-lock --region $AWS_REGION

    - name: Download ALB Policy
      run: |
        curl -o alb_iam_policy.json \
          https://raw.githubusercontent.com/kubernetes-sigs/aws-load-balancer-controller/v2.7.1/docs/install/iam_policy.json

    - name: Terraform Init
      run: terraform init

    - name: Terraform Plan
      run: terraform plan -out=tfplan

    - name: Terraform Apply
      if: github.event.inputs.action == 'apply' || (github.event_name == 'push')
      run: terraform apply -auto-approve -lock=false tfplan

    - name: Terraform Destroy
      if: github.event.inputs.action == 'destroy'
      run: terraform destroy -auto-approve -lock=false

    - name: Update kubeconfig
      if: github.event.inputs.action == 'apply' || (github.event_name == 'push')
      run: aws eks update-kubeconfig --region $AWS_REGION --name $CLUSTER_NAME

    - name: Install ALB Controller
      if: github.event.inputs.action == 'apply' || (github.event_name == 'push')
      run: |
        VPC_ID=$(terraform output -raw vpc_id)
        ROLE_ARN=$(terraform output -raw github_actions_role_arn)
        helm repo add eks https://aws.github.io/eks-charts
        helm repo update
        helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
          -n kube-system \
          --set clusterName=$CLUSTER_NAME \
          --set serviceAccount.create=true \
          --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=$ROLE_ARN \
          --set region=$AWS_REGION \
          --set vpcId=$VPC_ID

    - name: Install ArgoCD
      if: github.event.inputs.action == 'apply' || (github.event_name == 'push')
      run: |
        kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
        kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
        kubectl wait --for=condition=available deployment/argocd-server -n argocd --timeout=300s
        kubectl patch deployment argocd-server -n argocd \
          --type json \
          -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--insecure"}]'
        echo "ArgoCD admin password:"
        kubectl get secret argocd-initial-admin-secret -n argocd \
          -o jsonpath="{.data.password}" | base64 -d
        echo ""
        kubectl apply -f https://raw.githubusercontent.com/Raghukongala/girhub-action/main/argocd/application.yaml
