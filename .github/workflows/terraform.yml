name: Terraform Infra Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to perform'
        required: true
        default: 'apply'
        type: choice
        options:
        - plan
        - apply
        - destroy

env:
  AWS_REGION: ap-south-1
  TF_VERSION: 1.5.0

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || 'apply' }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Bootstrap S3 & DynamoDB
      run: |
        aws s3api head-bucket --bucket kannaya123-ecom 2>/dev/null || \
        aws s3api create-bucket \
          --bucket kannaya123-ecom \
          --region $AWS_REGION \
          --create-bucket-configuration LocationConstraint=$AWS_REGION
        aws s3api put-bucket-versioning \
          --bucket kannaya123-ecom \
          --versioning-configuration Status=Enabled
        aws dynamodb describe-table --table-name raghuterraform-lock --region $AWS_REGION 2>/dev/null || \
        aws dynamodb create-table \
          --table-name raghuterraform-lock \
          --attribute-definitions AttributeName=LockID,AttributeType=S \
          --key-schema AttributeName=LockID,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          --region $AWS_REGION
        aws dynamodb wait table-exists --table-name raghuterraform-lock --region $AWS_REGION

    - name: Download ALB Policy
      run: |
        curl -o alb_iam_policy.json \
          https://raw.githubusercontent.com/kubernetes-sigs/aws-load-balancer-controller/v2.7.1/docs/install/iam_policy.json

    - name: Terraform Init
      run: terraform init

    - name: Fix State - Remove and Reimport
      run: |
        # Import ECR repos
        terraform import 'aws_ecr_repository.repos["frontend"]' ecommerce/frontend 2>/dev/null || true
        terraform import 'aws_ecr_repository.repos["product-service"]' ecommerce/product-service 2>/dev/null || true
        terraform import 'aws_ecr_repository.repos["order-service"]' ecommerce/order-service 2>/dev/null || true
        terraform import 'aws_ecr_repository.repos["user-service"]' ecommerce/user-service 2>/dev/null || true
        terraform import 'aws_ecr_repository.repos["payment-service"]' ecommerce/payment-service 2>/dev/null || true

        # Import IAM roles
        terraform import aws_iam_role.eks_cluster ecommerce-eks-cluster-role 2>/dev/null || true
        terraform import aws_iam_role.eks_node ecommerce-eks-node-role 2>/dev/null || true
        terraform import aws_iam_role.github_actions ecommerce-eks-github-actions-role 2>/dev/null || true

        # Import IAM policy
        terraform import aws_iam_policy.alb_controller arn:aws:iam::957948932374:policy/ecommerce-eks-alb-controller-policy 2>/dev/null || true

        # Import OIDC providers
        terraform import aws_iam_openid_connect_provider.github_actions arn:aws:iam::957948932374:oidc-provider/token.actions.githubusercontent.com 2>/dev/null || true

        # Import EKS resources
        terraform import aws_eks_cluster.main ecommerce-eks 2>/dev/null || true
        terraform import aws_eks_node_group.main ecommerce-eks:ecommerce-eks-ng 2>/dev/null || true
        terraform import aws_eks_addon.ebs_csi ecommerce-eks:aws-ebs-csi-driver 2>/dev/null || true

    - name: Terraform Plan
      run: terraform plan -out=tfplan

    - name: Terraform Apply
      if: github.event.inputs.action != 'destroy' && github.event.inputs.action != 'plan'
      run: terraform apply -auto-approve tfplan

    - name: Terraform Destroy
      if: github.event.inputs.action == 'destroy'
      run: terraform destroy -auto-approve

    - name: Update kubeconfig
      if: github.event.inputs.action != 'destroy' && github.event.inputs.action != 'plan'
      run: |
        CLUSTER=$(aws eks list-clusters --region $AWS_REGION \
          --query "clusters[?contains(@,'ecommerce')]" --output text)
        aws eks update-kubeconfig --region $AWS_REGION --name $CLUSTER

    - name: Install ALB Controller
      if: github.event.inputs.action != 'destroy' && github.event.inputs.action != 'plan'
      run: |
        helm repo add eks https://aws.github.io/eks-charts
        helm repo update
        VPC_ID=$(terraform output -raw vpc_id)
        helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
          -n kube-system \
          --set clusterName=ecommerce-eks \
          --set serviceAccount.create=true \
          --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=$(terraform output -raw github_actions_role_arn) \
          --set region=$AWS_REGION \
          --set vpcId=$VPC_ID

    - name: Install ArgoCD
      if: github.event.inputs.action != 'destroy' && github.event.inputs.action != 'plan'
      run: |
        kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
        kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
        kubectl wait --for=condition=available deployment/argocd-server -n argocd --timeout=300s
        # Patch argocd-server to run insecure (for ALB)
        kubectl patch deployment argocd-server -n argocd \
          --type json \
          -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--insecure"}]'
        echo "ArgoCD admin password:"
        kubectl get secret argocd-initial-admin-secret -n argocd \
          -o jsonpath="{.data.password}" | base64 -d
        echo ""
        echo "Apply ArgoCD application:"
        kubectl apply -f https://raw.githubusercontent.com/Raghukongala/girhub-action/main/argocd/application.yaml
